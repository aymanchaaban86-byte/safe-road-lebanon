<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Safe Road - طرابلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Almarai', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); margin: 0; padding: 0; }
        #map { height: 250px; border-radius: 8px; width: 100%; z-index: 1; }
        .btn-primary { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); }
        .btn-primary:active { transform: scale(0.95); }
        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%); border: 1px solid rgba(59, 130, 246, 0.3); cursor: pointer; }
        input, select, textarea { font-size: 16px; }
        .modal { z-index: 999; }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen flex flex-col">
        <header class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 sticky top-0 z-40 p-4">
            <div class="flex justify-between items-center gap-2">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center text-lg">🚗</div>
                    <div>
                        <h1 class="text-xl font-bold">Safe Road</h1>
                        <p class="text-gray-400 text-xs">طرابلس 🎙️</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="showAdmin()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold text-sm">🔐 Admin</button>
                    <button onclick="showReport()" class="btn-primary text-white px-3 py-2 rounded-lg font-bold text-sm">➕ بلاغ</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 p-4 bg-slate-800/50">
            <div class="stat-card p-4 rounded-lg text-center" onclick="showModal('total')">
                <div class="text-2xl font-bold text-blue-400" id="totalCount">0</div>
                <p class="text-gray-400 text-xs mt-1">إجمالي</p>
            </div>
            <div class="stat-card p-4 rounded-lg text-center" onclick="showModal('confirmed')">
                <div class="text-2xl font-bold text-green-400" id="confirmedCount">0</div>
                <p class="text-gray-400 text-xs mt-1">مؤكد</p>
            </div>
            <div class="stat-card p-4 rounded-lg text-center" onclick="showModal('pending')">
                <div class="text-2xl font-bold text-yellow-400" id="pendingCount">0</div>
                <p class="text-gray-400 text-xs mt-1">معلق</p>
            </div>
            <div class="stat-card p-4 rounded-lg text-center" onclick="showModal('voice')">
                <div class="text-2xl font-bold text-purple-400" id="voiceCount">0</div>
                <p class="text-gray-400 text-xs mt-1">صوتي</p>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
            <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                <h2 class="text-lg font-bold mb-3">📍 الحواجز</h2>
                <div id="barriersList" class="space-y-2">
                    <p class="text-gray-400 text-center py-4">جاري التحميل...</p>
                </div>
            </div>
            <div class="rounded-lg overflow-hidden border border-slate-700">
                <div id="map"></div>
            </div>
        </main>
    </div>

    <div id="adminLoginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 modal">
        <div class="bg-slate-800 rounded-xl w-full max-w-sm border border-slate-700">
            <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xl font-bold">🔐 الإدارة</h2>
                <button onclick="closeAdminLogin()" class="text-gray-400 hover:text-white text-xl">✕</button>
            </div>
            <div class="p-4 space-y-4">
                <input type="password" id="adminLoginPass" placeholder="كلمة المرور" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white" onkeypress="if(event.key==='Enter') openAdminPanel()" />
                <div class="flex gap-2">
                    <button onclick="closeAdminLogin()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold">إلغاء</button>
                    <button onclick="openAdminPanel()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold">دخول</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reportModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 modal">
        <div class="bg-slate-800 rounded-xl w-full max-w-md max-h-[90vh] overflow-y-auto border border-slate-700">
            <div class="sticky top-0 bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xl font-bold">🎙️ بلاغ جديد</h2>
                <button onclick="hideReport()" class="text-gray-400 hover:text-white text-xl">✕</button>
            </div>

            <form id="reportForm" class="p-4 space-y-3" onsubmit="submitReport(event)">
                <div class="bg-slate-900 p-3 rounded-lg">
                    <label class="block text-sm text-gray-300 mb-2 font-bold">📍 الموقع</label>
                    <input type="text" id="location" placeholder="اسم الموقع" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white text-sm mb-2" />
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="latitude" placeholder="العرض" step="0.0001" required class="bg-slate-700 border border-slate-600 rounded-lg p-2 text-white text-sm" />
                        <input type="number" id="longitude" placeholder="الطول" step="0.0001" required class="bg-slate-700 border border-slate-600 rounded-lg p-2 text-white text-sm" />
                    </div>
                    <button type="button" onclick="getCurrentLocation()" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-bold">📍 موقعي الحالي</button>
                </div>

                <div>
                    <label class="block text-sm text-gray-300 mb-2 font-bold">🔒 نوع الحاجز</label>
                    <select id="type" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white text-sm">
                        <option value="">اختر النوع</option>
                        <option value="checkpoint">🔒 حاجز أمني</option>
                        <option value="traffic">🚗 اختناق مروري</option>
                        <option value="accident">💥 حادث</option>
                        <option value="construction">🏗️ أعمال بناء</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-gray-300 mb-2 font-bold">⚠️ درجة الخطورة</label>
                    <select id="severity" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white text-sm">
                        <option value="">اختر الدرجة</option>
                        <option value="low">✅ خفيف</option>
                        <option value="medium">⚡ متوسط</option>
                        <option value="high">⚠️ خطير</option>
                    </select>
                </div>

                <div class="bg-slate-900 p-3 rounded-lg">
                    <label class="block text-sm text-gray-300 mb-2 font-bold">🎙️ تسجيل الصوت</label>
                    <div id="recordingStatus" class="text-xs text-gray-400 mb-2">انقر الزر للبدء</div>
                    <div id="voiceTimer" class="text-center text-lg font-bold text-red-600 mb-2 hidden">00:00</div>
                    <div class="flex gap-2">
                        <button type="button" id="recordBtn" onclick="startRecording()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold text-sm">🎤 ابدأ</button>
                        <button type="button" id="stopBtn" onclick="stopRecording()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-bold text-sm hidden">⏹️ أوقف</button>
                    </div>
                    <div id="audioPlayback" class="hidden mt-2">
                        <audio id="audioPreview" class="w-full" controls style="max-height: 40px;"></audio>
                        <p class="text-xs text-green-400 mt-1">✅ تم التسجيل</p>
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="hideReport()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg font-bold text-sm">إلغاء</button>
                    <button type="submit" class="flex-1 btn-primary text-white px-3 py-2 rounded-lg font-bold text-sm">إرسال</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 modal">
        <div class="bg-slate-800 rounded-xl w-full max-w-md max-h-[90vh] overflow-y-auto border border-slate-700">
            <div class="sticky top-0 bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 id="detailTitle" class="text-xl font-bold">التفاصيل</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-xl">✕</button>
            </div>
            <div id="detailContent" class="p-4 space-y-2"></div>
        </div>
    </div>

    <script>
        let barriers = [];
        let map = null;
        let markers = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let timerInterval = null;
        let recordedAudioUrl = null;
        const STORAGE_KEY = 'safe_road_barriers';

        function formatDateTime(date) {
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            
            const day = days[date.getDay()];
            const dayNum = String(date.getDate()).padStart(2, '0');
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${day} ${dayNum} ${month} ${year} - ${hours}:${minutes}`;
        }

        function init() {
            console.log('🚀 جاري التحميل...');
            loadBarriers();
            initMap();
            setInterval(loadBarriers, 2000);
        }

        function loadBarriers() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                barriers = saved ? JSON.parse(saved) : [];
                console.log('📥 تم تحميل:', barriers.length, 'بلاغ');
                updateUI();
            } catch (error) {
                console.error('❌ خطأ:', error);
            }
        }

        function saveBarriers() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(barriers));
                console.log('💾 تم حفظ:', barriers.length, 'بلاغ');
                loadBarriers();
            } catch (error) {
                console.error('❌ خطأ في الحفظ:', error);
            }
        }

        function initMap() {
            map = L.map('map').setView([34.4367, 35.8279], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);
            updateMap();
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    document.getElementById('latitude').value = position.coords.latitude.toFixed(4);
                    document.getElementById('longitude').value = position.coords.longitude.toFixed(4);
                    alert('✅ تم تحديد الموقع');
                });
            }
        }

        function updateUI() {
            updateStats();
            updateBarriersList();
            updateMap();
        }

        function updateStats() {
            const total = barriers.length;
            const confirmed = barriers.filter(b => b.confirmed).length;
            const pending = total - confirmed;
            const voice = barriers.filter(b => b.voice).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('confirmedCount').textContent = confirmed;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('voiceCount').textContent = voice;
        }

        function updateBarriersList() {
            const list = document.getElementById('barriersList');
            if (barriers.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-4">لا توجد حواجز</p>';
                return;
            }
            list.innerHTML = barriers.map(b => `
                <div class="bg-slate-700 p-3 rounded-lg border-r-4 ${b.confirmed ? 'border-green-500' : 'border-yellow-500'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-bold text-sm">${b.location} ${b.voice ? '🎙️' : ''}</h3>
                            <p class="text-xs text-gray-400 mt-1">${b.type} - ${b.severity}</p>
                            <p class="text-xs text-gray-500 mt-1">📅 ${b.dateTime}</p>
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${b.confirmed ? 'bg-green-900' : 'bg-yellow-900'}">
                            ${b.confirmed ? '✓' : '⏳'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function updateMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            barriers.forEach(b => {
                const color = b.severity === 'high' ? '#ef4444' : b.severity === 'medium' ? '#f59e0b' : '#10b981';
                const marker = L.circleMarker([b.latitude, b.longitude], {
                    radius: 8,
                    fillColor: color,
                    color: color,
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);
                marker.bindPopup(`<b>${b.location}</b><br>${b.type}<br>${b.dateTime}`);
                markers.push(marker);
            });
        }

        function showReport() {
            document.getElementById('reportModal').classList.remove('hidden');
        }

        function hideReport() {
            document.getElementById('reportModal').classList.add('hidden');
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            document.getElementById('reportForm').reset();
            document.getElementById('audioPlayback').classList.add('hidden');
            recordedAudioUrl = null;
        }

        function startRecording() {
            audioChunks = [];
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            recordedAudioUrl = reader.result;
                            document.getElementById('audioPlayback').classList.remove('hidden');
                            document.getElementById('audioPreview').src = recordedAudioUrl;
                        };
                        reader.readAsDataURL(blob);
                    };
                    mediaRecorder.start();
                    document.getElementById('recordBtn').classList.add('hidden');
                    document.getElementById('stopBtn').classList.remove('hidden');
                    document.getElementById('recordingStatus').textContent = '🔴 جاري التسجيل...';
                    document.getElementById('voiceTimer').classList.remove('hidden');
                    
                    let seconds = 0;
                    timerInterval = setInterval(() => {
                        seconds++;
                        const mins = Math.floor(seconds / 60);
                        const secs = seconds % 60;
                        document.getElementById('voiceTimer').textContent = 
                            `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    }, 1000);
                });
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(timerInterval);
                document.getElementById('recordBtn').classList.remove('hidden');
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('recordingStatus').textContent = '✅ تم التسجيل';
                document.getElementById('voiceTimer').classList.add('hidden');
            }
        }

        function submitReport(e) {
            e.preventDefault();
            
            const location = document.getElementById('location').value;
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            const type = document.getElementById('type').value;
            const severity = document.getElementById('severity').value;

            if (!recordedAudioUrl) {
                alert('⚠️ سجل صوتاً أولاً');
                return;
            }

            const newBarrier = {
                id: Date.now().toString(),
                latitude: latitude,
                longitude: longitude,
                location: location,
                type: type,
                severity: severity,
                confirmed: false,
                reports: 1,
                timestamp: new Date().toISOString(),
                dateTime: formatDateTime(new Date()),
                voice: recordedAudioUrl
            };

            barriers.push(newBarrier);
            console.log('✅ تم إضافة بلاغ جديد');
            saveBarriers();
            hideReport();
            alert('✅ تم البلاغ بنجاح!');
        }

        function showModal(type) {
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');

            let data = [];
            if (type === 'total') {
                title.textContent = 'إجمالي الحواجز';
                data = barriers;
            } else if (type === 'confirmed') {
                title.textContent = 'حواجز مؤكدة';
                data = barriers.filter(b => b.confirmed);
            } else if (type === 'pending') {
                title.textContent = 'قيد المراجعة';
                data = barriers.filter(b => !b.confirmed);
            } else if (type === 'voice') {
                title.textContent = 'بلاغات صوتية';
                data = barriers.filter(b => b.voice);
            }

            content.innerHTML = data.length === 0 ? '<p class="text-center text-gray-400">لا توجد بيانات</p>' :
                data.map(b => `
                    <div class="bg-slate-700 p-2 rounded text-sm">
                        <p class="font-bold">${b.location}</p>
                        <p class="text-xs text-gray-400">${b.type} - ${b.severity}</p>
                        <p class="text-xs text-gray-500">📅 ${b.dateTime}</p>
                    </div>
                `).join('');

            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function showAdmin() {
            document.getElementById('adminLoginModal').classList.remove('hidden');
            document.getElementById('adminLoginPass').focus();
        }

        function closeAdminLogin() {
            document.getElementById('adminLoginModal').classList.add('hidden');
            document.getElementById('adminLoginPass').value = '';
        }

        function openAdminPanel() {
            const pass = document.getElementById('adminLoginPass').value;
            const storedPass = localStorage.getItem('adminPassword') || 'SafeRoad2024';
            
            if (pass === storedPass) {
                window.location.href = 'admin_mobile_fixed.html';
            } else {
                alert('❌ كلمة المرور خاطئة');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                showAdmin();
            }
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
