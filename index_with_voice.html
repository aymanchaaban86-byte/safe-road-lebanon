<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Road - تطبيق الإبلاغ عن الحواجز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Almarai', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); margin: 0; }
        #map { height: 500px; border-radius: 12px; z-index: 1; }
        .leaflet-container { border-radius: 12px; }
        .card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%); border: 1px solid rgba(71, 85, 105, 0.3); backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3); }
        .btn-success { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); transition: all 0.3s ease; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(22, 163, 74, 0.3); }
        .btn-danger { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); transition: all 0.3s ease; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3); }
        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%); border: 1px solid rgba(59, 130, 246, 0.3); }
        .barrier-item { transition: all 0.3s ease; cursor: pointer; }
        .barrier-item:hover { transform: translateX(-10px); background: linear-gradient(135deg, rgba(51, 65, 85, 0.5) 0%, rgba(30, 41, 59, 0.5) 100%); }
        .confirmed { border-right: 4px solid #16a34a; }
        .unconfirmed { border-right: 4px solid #eab308; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Voice Recording Styles */
        .recording { animation: recordingPulse 1s infinite; }
        @keyframes recordingPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .voice-timer { font-size: 18px; font-weight: bold; color: #dc2626; }
        .audio-waveform { display: flex; align-items: flex-end; height: 40px; gap: 2px; }
        .audio-bar { width: 3px; background: linear-gradient(180deg, #3b82f6, #8b5cf6); border-radius: 2px; animation: audioWave 0.3s ease; }
        @keyframes audioWave { 0%, 100% { height: 10px; } 50% { height: 30px; } }
        .voice-button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .voice-badge { display: inline-block; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="min-h-screen text-white">
        <header class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-red-700 rounded-lg flex items-center justify-center text-2xl shadow-lg">🚗</div>
                    <div>
                        <h1 class="text-3xl font-bold">Safe Road</h1>
                        <p class="text-gray-400 text-sm">نظام الإبلاغ الفوري عن الحواجز في طرابلس 🎙️</p>
                    </div>
                </div>
                <button onclick="showReport()" class="btn-primary text-white px-6 py-3 rounded-lg font-semibold shadow-lg">➕ إبلاغ جديد</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <div id="mainView" class="fade-in">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="stat-card p-6 rounded-xl text-center"><div class="text-4xl font-bold text-blue-400" id="totalCount">0</div><p class="text-gray-400 mt-2">إجمالي الحواجز</p></div>
                    <div class="stat-card p-6 rounded-xl text-center"><div class="text-4xl font-bold text-green-400" id="confirmedCount">0</div><p class="text-gray-400 mt-2">حواجز مؤكدة</p></div>
                    <div class="stat-card p-6 rounded-xl text-center"><div class="text-4xl font-bold text-yellow-400" id="unconfirmedCount">0</div><p class="text-gray-400 mt-2">قيد المراجعة</p></div>
                    <div class="stat-card p-6 rounded-xl text-center"><div class="text-4xl font-bold text-purple-400" id="reportsCount">0</div><p class="text-gray-400 mt-2">إجمالي البلاغات</p></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="card p-6 rounded-xl">
                            <h2 class="text-xl font-bold mb-4">🗺️ الخريطة التفاعلية</h2>
                            <div id="map"></div>
                        </div>
                    </div>
                    <div class="card p-6 rounded-xl h-[600px] overflow-y-auto">
                        <h2 class="text-xl font-bold mb-4">📋 قائمة الحواجز</h2>
                        <div id="barriersList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Report Modal with Voice Recording -->
    <div id="reportModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50 backdrop-blur">
        <div class="bg-slate-800 rounded-xl p-8 max-w-lg w-full border border-slate-700 shadow-2xl fade-in max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">📍 إبلاغ جديد</h2>
            
            <!-- Tab Selection -->
            <div class="flex gap-2 mb-6 border-b border-slate-700">
                <button onclick="switchReportMode('form')" id="formTab" class="px-4 py-2 border-b-2 border-red-500 text-white font-semibold">📝 نموذج</button>
                <button onclick="switchReportMode('voice')" id="voiceTab" class="px-4 py-2 border-b-2 border-transparent text-gray-400 font-semibold hover:text-white">🎙️ صوت</button>
            </div>

            <!-- Form Mode -->
            <form id="reportForm" class="space-y-4" onsubmit="submitReport(event)">
                <div><label class="block text-sm text-gray-300 mb-2">اسم الموقع *</label><input type="text" id="location" placeholder="مثل: شارع الجمهورية" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white placeholder-gray-400 focus:outline-none focus:border-red-500"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm text-gray-300 mb-2">خط العرض *</label><input type="number" id="latitude" placeholder="34.4367" step="0.0001" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white"></div>
                    <div><label class="block text-sm text-gray-300 mb-2">خط الطول *</label><input type="number" id="longitude" placeholder="35.8279" step="0.0001" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white"></div>
                </div>
                <div><label class="block text-sm text-gray-300 mb-2">نوع الحاجز *</label><select id="type" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-red-500"><option value="">اختر النوع</option><option value="checkpoint">🔒 حاجز أمني</option><option value="traffic">🚗 اختناق مروري</option><option value="accident">💥 حادث</option><option value="construction">🏗️ أعمال بناء</option></select></div>
                <div><label class="block text-sm text-gray-300 mb-2">درجة الخطورة *</label><select id="severity" required class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-red-500"><option value="">اختر الدرجة</option><option value="low">✅ خفيف</option><option value="medium">⚡ متوسط</option><option value="high">⚠️ خطير</option></select></div>
                <div><label class="block text-sm text-gray-300 mb-2">وصف تفصيلي (اختياري)</label><textarea id="description" placeholder="أضف معلومات إضافية..." class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white placeholder-gray-400 focus:outline-none focus:border-red-500" rows="3"></textarea></div>
                <div class="flex gap-3 pt-4"><button type="button" onclick="hideReport()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition">إلغاء</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-lg font-semibold transition">إرسال الإبلاغ</button></div>
            </form>

            <!-- Voice Recording Mode -->
            <div id="voiceMode" class="hidden space-y-6">
                <!-- Location Inputs for Voice -->
                <div class="space-y-4">
                    <div><label class="block text-sm text-gray-300 mb-2">اسم الموقع *</label><input type="text" id="voiceLocation" placeholder="مثل: شارع الجمهورية" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white placeholder-gray-400 focus:outline-none focus:border-red-500"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="block text-sm text-gray-300 mb-2">خط العرض *</label><input type="number" id="voiceLatitude" placeholder="34.4367" step="0.0001" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white"></div>
                        <div><label class="block text-sm text-gray-300 mb-2">خط الطول *</label><input type="number" id="voiceLongitude" placeholder="35.8279" step="0.0001" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white"></div>
                    </div>
                    <div><label class="block text-sm text-gray-300 mb-2">نوع الحاجز *</label><select id="voiceType" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-red-500"><option value="">اختر النوع</option><option value="checkpoint">🔒 حاجز أمني</option><option value="traffic">🚗 اختناق مروري</option><option value="accident">💥 حادث</option><option value="construction">🏗️ أعمال بناء</option></select></div>
                    <div><label class="block text-sm text-gray-300 mb-2">درجة الخطورة *</label><select id="voiceSeverity" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-red-500"><option value="">اختر الدرجة</option><option value="low">✅ خفيف</option><option value="medium">⚡ متوسط</option><option value="high">⚠️ خطير</option></select></div>
                </div>

                <!-- Voice Recorder -->
                <div class="bg-slate-900 p-6 rounded-lg border-2 border-blue-500">
                    <div class="text-center mb-6">
                        <h3 class="text-xl font-bold mb-4">🎙️ تسجيل الصوت</h3>
                        
                        <!-- Recording Status -->
                        <div id="recordingStatus" class="mb-4">
                            <p class="text-sm text-gray-300">انقر الزر للبدء</p>
                        </div>

                        <!-- Timer -->
                        <div id="voiceTimer" class="voice-timer mb-4 hidden">00:00</div>

                        <!-- Waveform Animation -->
                        <div id="audioWaveform" class="audio-waveform mb-6 justify-center hidden"></div>

                        <!-- Record Button -->
                        <div class="voice-button-group justify-center mb-6">
                            <button type="button" id="recordBtn" onclick="startRecording()" class="btn-primary text-white px-8 py-3 rounded-lg font-semibold">🎤 ابدأ التسجيل</button>
                            <button type="button" id="stopBtn" onclick="stopRecording()" class="btn-danger text-white px-8 py-3 rounded-lg font-semibold hidden">⏹️ أوقف التسجيل</button>
                        </div>

                        <!-- Audio Playback -->
                        <div id="audioPlayback" class="hidden">
                            <audio id="audioPreview" class="w-full mb-4" controls></audio>
                            <p class="text-sm text-green-400 mb-4">✅ تم تسجيل الصوت بنجاح</p>
                        </div>

                        <!-- Recording Info -->
                        <div id="recordingInfo" class="text-xs text-gray-400 hidden">
                            <p>🎙️ حد أقصى: 2 دقيقة</p>
                            <p>📊 جودة: عالية</p>
                        </div>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="hideReport()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition">إلغاء</button>
                    <button type="button" onclick="submitVoiceReport()" class="flex-1 btn-success text-white py-3 rounded-lg font-semibold transition">إرسال الإبلاغ الصوتي</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Voice Playback Modal -->
    <div id="voicePlaybackModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50 backdrop-blur">
        <div class="bg-slate-800 rounded-xl p-8 max-w-md w-full border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">🎙️ تشغيل الصوت</h2>
            <audio id="playbackAudio" class="w-full mb-4" controls></audio>
            <button onclick="closeVoicePlayback()" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-semibold">إغلاق</button>
        </div>
    </div>

    <script>
        let barriers = JSON.parse(localStorage.getItem('barriers')) || [
            { id: 1, latitude: 34.4367, longitude: 35.8279, location: 'شارع الجمهورية', type: 'checkpoint', description: 'حاجز أمني عسكري', severity: 'high', confirmed: true, reports: 5, timestamp: new Date().toISOString(), voice: null },
            { id: 2, latitude: 34.4450, longitude: 35.8400, location: 'طريق الرملة', type: 'traffic', description: 'اختناق مروري شديد', severity: 'medium', confirmed: true, reports: 3, timestamp: new Date().toISOString(), voice: null },
            { id: 3, latitude: 34.4500, longitude: 35.8350, location: 'تقاطع شارع بيروت', type: 'accident', description: 'حادث تصادم', severity: 'high', confirmed: false, reports: 2, timestamp: new Date().toISOString(), voice: null }
        ];
        
        let map = null;
        let markers = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStartTime = null;
        let timerInterval = null;
        let recordedAudioUrl = null;

        // Initialize map
        function initMap() {
            map = L.map('map').setView([34.4367, 35.8279], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 19 }).addTo(map);
            updateMap();
        }

        function updateMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            barriers.forEach(barrier => {
                const color = barrier.severity === 'high' ? '#ef4444' : barrier.severity === 'medium' ? '#f59e0b' : '#10b981';
                const voiceBadge = barrier.voice ? '🎙️ ' : '';
                const marker = L.circleMarker([barrier.latitude, barrier.longitude], { radius: 8, fillColor: color, color: color, weight: 2, opacity: 1, fillOpacity: 0.8 }).addTo(map);
                marker.bindPopup(`<b>${voiceBadge}${barrier.location}</b><br>${barrier.description}`);
                markers.push(marker);
            });
        }

        // Report Modal
        function showReport() { 
            document.getElementById('reportModal').classList.remove('hidden');
            switchReportMode('form');
        }
        
        function hideReport() { 
            document.getElementById('reportModal').classList.add('hidden');
            resetVoiceRecorder();
            document.getElementById('reportForm').reset();
        }

        // Switch between form and voice modes
        function switchReportMode(mode) {
            const formTab = document.getElementById('formTab');
            const voiceTab = document.getElementById('voiceTab');
            const reportForm = document.getElementById('reportForm');
            const voiceMode = document.getElementById('voiceMode');

            if (mode === 'form') {
                formTab.classList.add('border-red-500');
                voiceTab.classList.remove('border-red-500');
                reportForm.classList.remove('hidden');
                voiceMode.classList.add('hidden');
                resetVoiceRecorder();
            } else {
                formTab.classList.remove('border-red-500');
                voiceTab.classList.add('border-red-500');
                reportForm.classList.add('hidden');
                voiceMode.classList.remove('hidden');
            }
        }

        // Voice Recording Functions
        function startRecording() {
            audioChunks = [];
            recordedAudioUrl = null;
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        recordedAudioUrl = URL.createObjectURL(audioBlob);
                        
                        // Convert to base64 for storage
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            recordedAudioUrl = reader.result; // Store as base64
                            showAudioPlayback();
                        };
                        reader.readAsDataURL(audioBlob);
                    };
                    
                    mediaRecorder.start();
                    recordingStartTime = Date.now();
                    
                    // UI updates
                    document.getElementById('recordBtn').classList.add('hidden');
                    document.getElementById('stopBtn').classList.remove('hidden');
                    document.getElementById('recordingStatus').innerHTML = '<p class="text-sm text-blue-400 recording">🔴 جارٍ التسجيل...</p>';
                    document.getElementById('voiceTimer').classList.remove('hidden');
                    document.getElementById('recordingInfo').classList.remove('hidden');
                    document.getElementById('audioWaveform').classList.remove('hidden');
                    
                    startTimer();
                })
                .catch(err => {
                    alert('❌ لا يمكن الوصول إلى الميكروفون. يرجى التحقق من الأذونات.');
                    console.error(err);
                });
        }

        function stopRecording() {
            if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(timerInterval);
                
                // UI updates
                document.getElementById('recordBtn').classList.remove('hidden');
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('recordingStatus').innerHTML = '<p class="text-sm text-green-400">✅ تم التسجيل بنجاح</p>';
                document.getElementById('voiceTimer').classList.add('hidden');
                document.getElementById('recordingInfo').classList.add('hidden');
                document.getElementById('audioWaveform').classList.add('hidden');
                document.getElementById('audioWaveform').innerHTML = '';
            }
        }

        function startTimer() {
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('voiceTimer').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                
                // Update waveform
                updateWaveform();
                
                // Stop after 2 minutes
                if (seconds >= 120) {
                    stopRecording();
                    alert('⏱️ انتهى وقت التسجيل (2 دقيقة)');
                }
            }, 1000);
        }

        function updateWaveform() {
            const waveform = document.getElementById('audioWaveform');
            if (waveform.children.length < 40) {
                const bar = document.createElement('div');
                bar.className = 'audio-bar';
                bar.style.height = Math.random() * 30 + 10 + 'px';
                waveform.appendChild(bar);
            }
        }

        function showAudioPlayback() {
            document.getElementById('audioPlayback').classList.remove('hidden');
            const audioPreview = document.getElementById('audioPreview');
            audioPreview.src = recordedAudioUrl;
        }

        function resetVoiceRecorder() {
            audioChunks = [];
            recordedAudioUrl = null;
            clearInterval(timerInterval);
            document.getElementById('recordBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('audioPlayback').classList.add('hidden');
            document.getElementById('recordingStatus').innerHTML = '<p class="text-sm text-gray-300">انقر الزر للبدء</p>';
            document.getElementById('voiceTimer').classList.add('hidden');
            document.getElementById('recordingInfo').classList.add('hidden');
            document.getElementById('audioWaveform').classList.add('hidden');
            document.getElementById('audioWaveform').innerHTML = '';
        }

        // Submit Form Report
        function submitReport(e) {
            e.preventDefault();
            const newBarrier = {
                id: Date.now(),
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                location: document.getElementById('location').value,
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                severity: document.getElementById('severity').value,
                confirmed: false,
                reports: 1,
                timestamp: new Date().toISOString(),
                voice: null
            };
            barriers.push(newBarrier);
            saveData();
            updateUI();
            hideReport();
            alert('✅ تم الإبلاغ بنجاح!');
            document.querySelector('#reportForm').reset();
        }

        // Submit Voice Report
        function submitVoiceReport() {
            const location = document.getElementById('voiceLocation').value;
            const latitude = parseFloat(document.getElementById('voiceLatitude').value);
            const longitude = parseFloat(document.getElementById('voiceLongitude').value);
            const type = document.getElementById('voiceType').value;
            const severity = document.getElementById('voiceSeverity').value;

            if (!location || !latitude || !longitude || !type || !severity) {
                alert('⚠️ يرجى ملء جميع الحقول المطلوبة');
                return;
            }

            if (!recordedAudioUrl) {
                alert('⚠️ يرجى تسجيل صوت أولاً');
                return;
            }

            const newBarrier = {
                id: Date.now(),
                latitude: latitude,
                longitude: longitude,
                location: location,
                type: type,
                description: 'بلاغ صوتي 🎙️',
                severity: severity,
                confirmed: false,
                reports: 1,
                timestamp: new Date().toISOString(),
                voice: recordedAudioUrl
            };

            barriers.push(newBarrier);
            saveData();
            updateUI();
            hideReport();
            alert('✅ تم الإبلاغ الصوتي بنجاح!');
        }

        // Play barrier voice
        function playBarrierVoice(barrierId) {
            const barrier = barriers.find(b => b.id === barrierId);
            if (barrier && barrier.voice) {
                document.getElementById('playbackAudio').src = barrier.voice;
                document.getElementById('voicePlaybackModal').classList.remove('hidden');
            }
        }

        function closeVoicePlayback() {
            document.getElementById('voicePlaybackModal').classList.add('hidden');
            document.getElementById('playbackAudio').pause();
        }

        function saveData() { localStorage.setItem('barriers', JSON.stringify(barriers)); }

        function updateUI() {
            updateStats();
            updateBarriersList();
            updateMap();
        }

        function updateStats() {
            const total = barriers.length;
            const confirmed = barriers.filter(b => b.confirmed).length;
            const unconfirmed = total - confirmed;
            const reports = barriers.reduce((a, b) => a + b.reports, 0);
            document.getElementById('totalCount').textContent = total;
            document.getElementById('confirmedCount').textContent = confirmed;
            document.getElementById('unconfirmedCount').textContent = unconfirmed;
            document.getElementById('reportsCount').textContent = reports;
        }

        function updateBarriersList() {
            const list = document.getElementById('barriersList');
            if (barriers.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد حواجز مسجلة حالياً</p>';
                return;
            }
            list.innerHTML = barriers.map(barrier => `
                <div class="barrier-item ${barrier.confirmed ? 'confirmed' : 'unconfirmed'} bg-slate-700 p-4 rounded-lg">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-white">${barrier.location}</h3>
                        ${barrier.voice ? '<span class="voice-badge">🎙️ صوتي</span>' : ''}
                    </div>
                    <p class="text-sm text-gray-300 mt-1">${barrier.description}</p>
                    <div class="flex gap-2 mt-3 flex-wrap">
                        <span class="text-xs px-2 py-1 rounded bg-slate-600 text-gray-200">${barrier.type === 'checkpoint' ? '🔒' : barrier.type === 'traffic' ? '🚗' : barrier.type === 'accident' ? '💥' : '🏗️'} ${barrier.type}</span>
                        <span class="text-xs px-2 py-1 rounded ${barrier.severity === 'high' ? 'bg-red-900 text-red-200' : barrier.severity === 'medium' ? 'bg-amber-900 text-amber-200' : 'bg-green-900 text-green-200'}">${barrier.severity === 'high' ? '⚠️ خطير' : barrier.severity === 'medium' ? '⚡ متوسط' : '✅ خفيف'}</span>
                        ${barrier.confirmed ? '<span class="text-xs px-2 py-1 rounded bg-green-900 text-green-200">✓ مؤكد</span>' : ''}
                    </div>
                    ${barrier.voice ? `<button onclick="playBarrierVoice(${barrier.id})" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 rounded font-semibold">🎙️ اسمع الصوت</button>` : ''}
                </div>
            `).join('');
        }

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                const pass = prompt('🔐 أدخل كلمة المرور:');
                if (pass === 'SafeRoad2024') {
                    window.location.href = 'admin.html';
                } else if (pass !== null) {
                    alert('❌ كلمة المرور خاطئة!');
                }
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            updateUI();
        });
    </script>
</body>
</html>
