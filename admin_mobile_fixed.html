<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Road Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Almarai', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); margin: 0; }
        input, select { font-size: 16px; }
        .btn { cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); }
        .barrier-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(71, 85, 105, 0.3); transition: all 0.2s; }
        .barrier-card:hover { background: rgba(30, 41, 59, 1); }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- Login -->
    <div id="login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-sm border border-slate-700">
            <h1 class="text-2xl font-bold text-center mb-6">🔐 Admin</h1>
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white mb-4" onkeypress="if(event.key==='Enter') login()" />
            <button onclick="login()" class="w-full bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-lg font-bold btn">دخول</button>
        </div>
    </div>

    <!-- Admin -->
    <div id="admin" class="hidden min-h-screen pb-20">
        <!-- Header -->
        <header class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 sticky top-0 z-40 p-4">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold">Safe Road Admin 🔐</h1>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold btn">خروج</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-2 p-4 bg-slate-800/50">
            <div class="bg-blue-900 p-4 rounded-lg text-center">
                <div class="text-2xl font-bold" id="totalCount">0</div>
                <p class="text-xs text-gray-300 mt-1">إجمالي</p>
            </div>
            <div class="bg-green-900 p-4 rounded-lg text-center">
                <div class="text-2xl font-bold" id="confirmedCount">0</div>
                <p class="text-xs text-gray-300 mt-1">مؤكد</p>
            </div>
            <div class="bg-yellow-900 p-4 rounded-lg text-center">
                <div class="text-2xl font-bold" id="pendingCount">0</div>
                <p class="text-xs text-gray-300 mt-1">معلق</p>
            </div>
            <div class="bg-purple-900 p-4 rounded-lg text-center">
                <div class="text-2xl font-bold" id="voiceCount">0</div>
                <p class="text-xs text-gray-300 mt-1">صوتي</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-0 border-b border-slate-700 sticky top-16 bg-slate-800 z-30">
            <button onclick="switchTab('all')" id="allTab" class="flex-1 px-4 py-3 border-b-2 border-red-600 text-white font-bold btn">جميع</button>
            <button onclick="switchTab('pending')" id="pendingTab" class="flex-1 px-4 py-3 border-b-2 border-transparent text-gray-400 font-bold btn hover:text-white">معلقة</button>
        </div>

        <!-- Content -->
        <div class="p-4 space-y-3">
            <div id="allContent"></div>
            <div id="pendingContent" class="hidden"></div>
        </div>

        <!-- Settings Button -->
        <button onclick="showSettings()" class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold btn shadow-lg">⚙️</button>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4" style="z-index: 999;">
        <div class="bg-slate-800 rounded-xl w-full max-w-sm border border-slate-700">
            <div class="bg-slate-900 p-4 border-b border-slate-700">
                <h2 class="text-xl font-bold">⚙️ الإعدادات</h2>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-2 font-bold">كلمة المرور الحالية</label>
                    <input type="password" id="currentPass" placeholder="الكلمة الحالية" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white" />
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-2 font-bold">كلمة المرور الجديدة</label>
                    <input type="password" id="newPass" placeholder="كلمة جديدة" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white" />
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-2 font-bold">تأكيد الكلمة الجديدة</label>
                    <input type="password" id="confirmPass" placeholder="تأكيد" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 text-white" />
                </div>
                <div class="flex gap-2">
                    <button onclick="closeSettings()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold btn">إلغاء</button>
                    <button onclick="changePassword()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold btn">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Player Modal -->
    <div id="audioModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4" style="z-index: 999;">
        <div class="bg-slate-800 rounded-xl w-full max-w-sm border border-slate-700">
            <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xl font-bold">🎙️ استماع</h2>
                <button onclick="closeAudioModal()" class="text-gray-400 hover:text-white text-xl btn">✕</button>
            </div>
            <div class="p-4">
                <audio id="audioPlayer" class="w-full" controls style="min-height: 50px;"></audio>
                <p id="audioInfo" class="text-sm text-gray-300 mt-4"></p>
            </div>
        </div>
    </div>

    <script>
        let barriers = [];
        const defaultPassword = 'SafeRoad2024';

        function login() {
            const pass = document.getElementById('pass').value;
            const storedPass = localStorage.getItem('adminPassword') || defaultPassword;
            if (pass === storedPass) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('admin').classList.remove('hidden');
                loadBarriers();
                setInterval(loadBarriers, 3000);
            } else {
                alert('❌ كلمة المرور خاطئة');
            }
        }

        function logout() {
            document.getElementById('admin').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pass').value = '';
        }

        function loadBarriers() {
            try {
                const saved = localStorage.getItem('barriers');
                barriers = saved ? JSON.parse(saved) : [];
                updateUI();
            } catch (error) {
                console.error('Error loading barriers:', error);
                alert('❌ خطأ في تحميل البيانات');
            }
        }

        function updateUI() {
            const total = barriers.length;
            const confirmed = barriers.filter(b => b.confirmed).length;
            const pending = total - confirmed;
            const voice = barriers.filter(b => b.voice).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('confirmedCount').textContent = confirmed;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('voiceCount').textContent = voice;

            updateAllList();
            updatePendingList();
        }

        function updateAllList() {
            const html = barriers.length === 0 ? 
                '<p class="text-center text-gray-400 py-8">لا توجد بيانات</p>' :
                barriers.map(b => createCard(b)).join('');
            document.getElementById('allContent').innerHTML = html;
        }

        function updatePendingList() {
            const pending = barriers.filter(b => !b.confirmed);
            const html = pending.length === 0 ?
                '<p class="text-center text-gray-400 py-8">جميع البلاغات مؤكدة ✅</p>' :
                pending.map(b => createCard(b)).join('');
            document.getElementById('pendingContent').innerHTML = html;
        }

        function createCard(b) {
            return `
                <div class="barrier-card p-4 rounded-lg border-r-4 ${b.confirmed ? 'border-green-500' : 'border-yellow-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <h3 class="font-bold text-sm">${b.location} ${b.voice ? '🎙️' : ''}</h3>
                            <p class="text-xs text-gray-400 mt-1">${b.description}</p>
                            <p class="text-xs text-gray-500 mt-1">📅 ${b.dateTime || 'بدون تاريخ'}</p>
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${b.confirmed ? 'bg-green-900' : 'bg-yellow-900'}">
                            ${b.confirmed ? '✓ مؤكد' : '⏳ معلق'}
                        </span>
                    </div>
                    <div class="flex gap-1 mb-3 text-xs">
                        <span class="px-2 py-1 rounded bg-slate-700">${b.type}</span>
                        <span class="px-2 py-1 rounded ${b.severity === 'high' ? 'bg-red-900' : b.severity === 'medium' ? 'bg-yellow-900' : 'bg-green-900'}">
                            ${b.severity}
                        </span>
                    </div>
                    <div class="flex gap-2 text-xs flex-wrap">
                        ${!b.confirmed ? `<button onclick="confirmBarrier('${b.id}')" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-2 py-2 rounded font-bold btn" data-id="${b.id}">✓ تأكيد</button>` : ''}
                        <button onclick="deleteBarrier('${b.id}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-2 py-2 rounded font-bold btn" data-id="${b.id}">🗑️ حذف</button>
                        ${b.voice ? `<button onclick="playAudio('${b.id}')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-2 py-2 rounded font-bold btn" data-id="${b.id}">▶️ استمع</button>` : ''}
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            const isAll = tab === 'all';
            document.getElementById('allContent').classList.toggle('hidden', !isAll);
            document.getElementById('pendingContent').classList.toggle('hidden', isAll);
            document.getElementById('allTab').classList.toggle('border-red-600', isAll);
            document.getElementById('pendingTab').classList.toggle('border-red-600', !isAll);
            document.getElementById('allTab').classList.toggle('border-transparent', !isAll);
            document.getElementById('pendingTab').classList.toggle('border-transparent', isAll);
        }

        function confirmBarrier(id) {
            const barrier = barriers.find(b => b.id === id);
            if (barrier) {
                barrier.confirmed = true;
                try {
                    localStorage.setItem('barriers', JSON.stringify(barriers));
                    updateUI();
                    alert('✅ تم تأكيد البلاغ');
                } catch (error) {
                    alert('❌ خطأ في الحفظ: ' + error.message);
                }
            }
        }

        function deleteBarrier(id) {
            if (confirm('هل تريد حذف هذا البلاغ؟')) {
                barriers = barriers.filter(b => b.id !== id);
                try {
                    localStorage.setItem('barriers', JSON.stringify(barriers));
                    updateUI();
                    alert('✅ تم الحذف');
                } catch (error) {
                    alert('❌ خطأ في الحذف: ' + error.message);
                }
            }
        }

        function playAudio(id) {
            const barrier = barriers.find(b => b.id === id);
            if (barrier && barrier.voice) {
                document.getElementById('audioPlayer').src = barrier.voice;
                document.getElementById('audioInfo').textContent = `${barrier.location} - ${barrier.dateTime || ''}`;
                document.getElementById('audioModal').classList.remove('hidden');
            }
        }

        function closeAudioModal() {
            document.getElementById('audioModal').classList.add('hidden');
            document.getElementById('audioPlayer').pause();
        }

        function showSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmPass').value = '';
        }

        function changePassword() {
            const current = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmVal = document.getElementById('confirmPass').value;

            const storedPass = localStorage.getItem('adminPassword') || defaultPassword;
            
            if (current !== storedPass) {
                alert('❌ كلمة المرور الحالية خاطئة');
                return;
            }

            if (newPass !== confirmVal) {
                alert('❌ الكلمات الجديدة غير متطابقة');
                return;
            }

            if (newPass.length < 4) {
                alert('❌ الكلمة يجب أن تكون 4 أحرف على الأقل');
                return;
            }

            localStorage.setItem('adminPassword', newPass);
            alert('✅ تم تغيير كلمة المرور');
            closeSettings();
        }

        // Close audio modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAudioModal();
                closeSettings();
            }
        });
    </script>
</body>
</html>
